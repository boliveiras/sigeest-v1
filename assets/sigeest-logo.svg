<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 392 96" width="392" height="96" role="img" aria-label="SIGEEST - Sistema de Gerenciamento de Estruturas">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- ICONE: torre de transmissao + ondas de sinal -->
  <g transform="translate(8,9) scale(1.18)"
     fill="none" stroke="url(#sg)" stroke-width="3"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- ondas de sinal (direita) -->
    <path d="M38.78,7.33 A11 11 0 0 1 38.78,24.67"/>
    <path d="M42.9,4.3 A16 16 0 0 1 42.9,27.7"/>
    <!-- ondas de sinal (esquerda) -->
    <path d="M25.22,7.33 A11 11 0 0 0 25.22,24.67"/>
    <path d="M21.1,4.3 A16 16 0 0 0 21.1,27.7"/>

    <!-- ponta da antena -->
    <circle cx="32" cy="16" r="2.4" fill="url(#sg)" stroke="none"/>

    <!-- torre -->
    <path d="M16,58 L28,22 M48,58 L36,22 M28,22 L36,22"/>
    <!-- travessas -->
    <path d="M24,34 L40,34 M20,46 L44,46" stroke-width="2"/>
    <!-- zig-zag interno -->
    <path d="M24,34 L44,46 M40,34 L20,46" stroke-width="1.6"/>
    <!-- pes -->
    <path d="M16,58 L12,61 M48,58 L52,61"/>
  </g>

  <!-- WORDMARK -->
  <text x="100" y="51"
        font-family="'Segoe UI', 'Bahnschrift', system-ui, Roboto, Helvetica, Arial, sans-serif"
        font-size="42" font-weight="600" letter-spacing="2.5"
        fill="url(#sg)">SIGEEST</text>

  <!-- SUBTITULO -->
  <text x="102" y="74"
        font-family="'Segoe UI', system-ui, Roboto, Helvetica, Arial, sans-serif"
        font-size="12" font-weight="500" letter-spacing="0.8"
        fill="#94A3B8">Sistema de Gerenciamento de Estruturas</text>
</svg>
